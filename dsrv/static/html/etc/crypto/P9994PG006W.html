<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>결제에 혜택을 담다, paybooc</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, target-densitydpi=medium-dpi">
	<meta http-equiv="Expires" content="-1">
	<meta http-equiv="Pragma" content="no-cache">
	<meta http-equiv="Cache-Control" content="No-Cache">
	<link rel="stylesheet" href="../../../assets/styles/etc/crypto.css">

	<!---------------------------------------------------------------------- UI ----->
	<script src="../../../assets/scripts/libs/jquery-2.2.3.min.js"></script>
	<script src="../../../js/comm/common.js"></script>
	<script src="../../../js/comm/app_scheme.js"></script>
	<script src="../../../js/comm/ajax.js"></script>
	<script src="../../../assets/scripts/comm/common.ui.js"></script>
	<!---------------------------------------------------------------------- UI ----->

	<script src="../../../assets/scripts/etc/crypto.js"></script>

	<style>
		/* 카메라 영상: .spot(288x288 정사각형 원형마스크)을 cover로 꽉 채움.
		   .spot 이 정사각형이므로 cover = 소스의 중앙 정사각형이 그대로 노출 →
		   분석(중앙 정사각형 크롭)과 표시 영역이 정확히 일치한다. */
		.scan-area .face-area .spot #lvVideo {
			position: absolute; left: 0; top: 0; transform: scaleX(-1);
			width: 100%; height: 100%; max-width: none;
			object-fit: cover; background: #000;
		}
		/* 단계별 가이드 이미지 전환 */
		.scan-area .face-area .guide img { transition: opacity .2s ease; }

		/* 온디바이스 디버그 readout (?debug=1 일 때만 노출) */
		.lv-debug {
			display: none; position: fixed; left: 8px; bottom: 8px; z-index: 999;
			background: rgba(0,0,0,.72); color: #0f0; font: 11px/1.5 monospace;
			padding: 6px 8px; border-radius: 6px; white-space: pre; pointer-events: none;
		}
		.lv-debug.on { display: block; }
	</style>
</head>
<body class="bg--gray">
	<header class="renew01-header">
		<a href="javascript:void(0);" class="btn-back">Back</a>
		<a href="P9994PG007W.html" class="btn-skip right">Skip</a>
	</header>
	<div class="crpt-verify">
		<div class="scan-area">
			<div class="face-area">
				<div class="circle-out">
					<div class="circle-in"></div>
				</div>

				<div class="spot">
					<!-- 전면 카메라 영상 (원형 마스크 안을 cover로 채움) -->
					<video id="lvVideo" autoplay playsinline muted></video>
				</div>

				<!-- 단계별 가이드 (정면/좌/우) -->
				<div class="guide">
					<img id="lvGuide" src="../../../assets/images/etc/crypto/face-guide-front.png" alt="">
				</div>

				<!-- 정면/측면 인식 완료 시마다 uiCheckMotion() 으로 점멸 -->
				<div class="done"></div>
			</div>

			<div class="indicator">
				<span class="active"></span>
				<span></span>
				<span></span>
			</div>

			<div class="scan-stat">
				<p class="txt" id="lvText">Position your face<br>in the circle</p>
			</div>
		</div>
	</div>

	<!-- 온디바이스 디버그 readout -->
	<div class="lv-debug" id="lvDebug"></div>

	<script type="module">
		/* ===== Liveness 얼굴 인증 (PoC) =====
		 * MediaPipe FaceLandmarker(@mediapipe/tasks-vision, CDN)로 실제 head pose(yaw)를 계산해
		 * 정면 → 좌 → 우 회전을 판정한다.
		 * 이전 버전(피부색 YCbCr centroid 휴리스틱)은 얼굴이 화면을 꽉 채운 상태에서 "회전"해도
		 * 피부 블롭의 중심(centroid)이 거의 이동하지 않아(관측값: front/left/right cx 모두 0.50~0.51,
		 * 임계값 0.035 미만) 좌우 회전을 구분하지 못하는 근본적 한계가 있었다.
		 * facialTransformationMatrix에서 yaw(좌우 회전각)를 직접 추출하면 이 문제가 없다.
		 */
		import {
			FilesetResolver,
			FaceLandmarker
		} from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

		var LV_GUIDE = {
			0: '../../../assets/images/etc/crypto/face-guide-front.png',
			1: '../../../assets/images/etc/crypto/face-guide-left.png',
			2: '../../../assets/images/etc/crypto/face-guide-right.png'
		};
		var lvState = null;
		var LV_DEBUG = /[?&]debug=1/.test(location.search);
		var faceLandmarker = null;

		function lvInitState() {
			return {
				stage: 0,          // 0=정면, 1=좌, 2=우
				baseYaw: null,     // 정면에서 잡은 기준 yaw(deg)
				holdCount: 0,      // 조건 연속 충족 프레임 수
				emaYaw: null,      // yaw 평활화
				finished: false,
				rafId: null
			};
		}

		async function startLiveness() {
			lvState = lvInitState();
			if (LV_DEBUG) document.getElementById('lvDebug').classList.add('on');
			lvSetGuide(0);
			lvSetText('Loading face model...');

			if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
				lvSetText('Camera is not supported<br>on this device');
				return;
			}

			try {
				var vision = await FilesetResolver.forVisionTasks(
					'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
				);
				faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
					baseOptions: {
						modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
						delegate: 'CPU'
					},
					outputFacialTransformationMatrixes: true,
					runningMode: 'VIDEO',
					numFaces: 1
				});
			} catch (err) {
				lvSetText('Failed to load<br>face detection model');
				return;
			}

			lvSetText('Position your face<br>in the circle');
			navigator.mediaDevices.getUserMedia({
				video: { facingMode: { ideal: 'user' }, width: { ideal: 720 }, height: { ideal: 1280 } },
				audio: false
			}).then(function (stream) {
				var v = document.getElementById('lvVideo');
				v.srcObject = stream;
				v.play();
				lvState.rafId = requestAnimationFrame(analyzeLvFrame);
			}).catch(function (err) {
				lvSetText('Camera is unavailable<br>(' + (err && err.name || 'error') + ')');
			});
		}

		function lvSetText(html) { document.getElementById('lvText').innerHTML = html; }
		function lvSetGuide(stage) {
			var g = document.getElementById('lvGuide');
			if (LV_GUIDE[stage]) g.src = LV_GUIDE[stage];
		}

		// 진행 인디케이터 점등
		function lvSetIndicator(stage) {
			var dots = document.querySelectorAll('.scan-area .indicator > span');
			for (var i = 0; i < dots.length; i++) {
				dots[i].classList.toggle('active', i === stage);
			}
		}

		// facialTransformationMatrix(4x4, column-major) → yaw(deg) 추출
		// 화면은 scaleX(-1) 거울이므로, 화면상 방향과 맞추기 위해 부호를 반전한다.
		function matrixToYawDeg(m) {
			// row-major 회전요소: m[0]=R00, m[2]=R02(=-sin(yaw)), m[10]=R22
			var yawRad = Math.atan2(-m[2], m[10]);
			return -(yawRad * 180 / Math.PI); // 거울 보정을 위한 부호 반전
		}

		var LV_ANALYZE_INTERVAL_MS = 150; // 모바일 CPU delegate 부하 완화용 스로틀
		var lvLastAnalyzeTime = 0;

		function analyzeLvFrame(now) {
			var v = document.getElementById('lvVideo');
			if (!lvState || lvState.finished) return;
			if (!v.videoWidth || !faceLandmarker) {
				lvState.rafId = requestAnimationFrame(analyzeLvFrame);
				return;
			}
			if (now - lvLastAnalyzeTime < LV_ANALYZE_INTERVAL_MS) {
				lvState.rafId = requestAnimationFrame(analyzeLvFrame);
				return;
			}
			lvLastAnalyzeTime = now;

			var result = faceLandmarker.detectForVideo(v, now);
			var hasFace = result.faceLandmarks && result.faceLandmarks.length > 0
				&& result.facialTransformationMatrixes && result.facialTransformationMatrixes.length > 0;

			if (!hasFace) {
				lvState.holdCount = 0;
				if (lvState.stage === 0) lvSetText('Position your face<br>in the circle');
				if (LV_DEBUG) {
					document.getElementById('lvDebug').textContent =
						'stage : ' + lvState.stage + '\nface  : not detected';
				}
				lvState.rafId = requestAnimationFrame(analyzeLvFrame);
				return;
			}

			var yaw = matrixToYawDeg(result.facialTransformationMatrixes[0].data);
			lvState.emaYaw = (lvState.emaYaw == null) ? yaw : (lvState.emaYaw * 0.4 + yaw * 0.6);

			if (LV_DEBUG) {
				document.getElementById('lvDebug').textContent =
					'stage : ' + lvState.stage + '\n' +
					'yaw   : ' + lvState.emaYaw.toFixed(1) + 'deg\n' +
					'base  : ' + (lvState.baseYaw == null ? '-' : lvState.baseYaw.toFixed(1) + 'deg') + '\n' +
					'hold  : ' + lvState.holdCount;
			}

			handleLvStage(lvState.emaYaw);
			lvState.rafId = requestAnimationFrame(analyzeLvFrame);
		}

		// 스테이지 게이트: 정면 → 좌 → 우
		function handleLvStage(yaw) {
			var FRONT_TH = 10;   // 정면 판정: |yaw| < 10deg
			var TURN_TH = 15;    // 좌/우 판정: 기준각 대비 15deg 이상 회전
			var HOLD_NEED = 3;   // 연속 충족 프레임 수(떨림 방지)

			if (lvState.stage === 0) {
				lvSetText('Position your face<br>in the circle');
				if (Math.abs(yaw) < FRONT_TH) {
					lvState.holdCount++;
					if (lvState.holdCount >= HOLD_NEED) {
						lvState.baseYaw = yaw;
						lvAdvanceStage();
					}
				} else { lvState.holdCount = 0; }

			} else if (lvState.stage === 1) {
				lvSetText('Turn your head<br>to the left');
				// 화면=거울 보정 후: 왼쪽으로 돌리면 yaw가 음의 방향으로 커짐
				if (yaw < lvState.baseYaw - TURN_TH) {
					lvState.holdCount++;
					if (lvState.holdCount >= HOLD_NEED) lvAdvanceStage();
				} else { lvState.holdCount = 0; }

			} else if (lvState.stage === 2) {
				lvSetText('Turn your head<br>to the right');
				if (yaw > lvState.baseYaw + TURN_TH) {
					lvState.holdCount++;
					if (lvState.holdCount >= HOLD_NEED) lvAdvanceStage();
				} else { lvState.holdCount = 0; }
			}
		}

		// 스테이지 완료 → 체크 점멸 + 인디케이터 + 가이드 전환, 마지막이면 완료
		function lvAdvanceStage() {
			lvState.holdCount = 0;
			if (typeof uiCheckMotion === 'function') uiCheckMotion(); // .done 점멸

			if (lvState.stage >= 2) {
				completeLiveness();
			} else {
				lvState.stage++;
				lvSetIndicator(lvState.stage);
				lvSetGuide(lvState.stage);
			}
		}

		// 인증 완료 → 토스트 후 P9994PG007W 로 이동
		function completeLiveness() {
			if (lvState.finished) return;
			lvState.finished = true;
			if (lvState.rafId) cancelAnimationFrame(lvState.rafId);
			if (typeof toastPopup === 'function') toastPopup('Verification complete');
			lvSetText('Verification<br>complete');
			setTimeout(function () {
				stopLvCamera();
				location.href = 'P9994PG007W.html';
			}, 1200);
		}

		function stopLvCamera() {
			var v = document.getElementById('lvVideo');
			if (v && v.srcObject) {
				v.srcObject.getTracks().forEach(function (t) { t.stop(); });
				v.srcObject = null;
			}
		}

		// 화면 이탈 시 카메라/타이머 정리 (.btn-back 은 crypto.js 전역 핸들러가 처리)
		window.addEventListener('pagehide', function () {
			if (lvState && lvState.rafId) cancelAnimationFrame(lvState.rafId);
			stopLvCamera();
		});

		startLiveness();
	</script>
</body>
</html>
