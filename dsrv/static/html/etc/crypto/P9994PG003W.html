<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>결제에 혜택을 담다, paybooc</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, target-densitydpi=medium-dpi">
	<meta http-equiv="Expires" content="-1">
	<meta http-equiv="Pragma" content="no-cache">
	<meta http-equiv="Cache-Control" content="No-Cache">
	<link rel="stylesheet" href="../../../assets/styles/etc/crypto.css">

	<!---------------------------------------------------------------------- UI ----->
	<script src="../../../assets/scripts/libs/jquery-2.2.3.min.js"></script>
	<script src="../../../js/comm/common.js"></script>
	<script src="../../../js/comm/app_scheme.js"></script>
	<script src="../../../js/comm/ajax.js"></script>
	<script src="../../../assets/scripts/comm/common.ui.js"></script>
	<!---------------------------------------------------------------------- UI ----->

	<script src="../../../assets/scripts/etc/crypto.js"></script>
	<script src="../../../assets/scripts/libs/lottie-player.js" async></script>
	<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
	<header class="renew01-header">
		<a href="P9994PG004W.html" class="btn-skip">Skip</a>
		<a href="javascript:void(0);" class="btn-close">Close</a>
	</header>
	<div class="crpt-verify">
		<div class="scan-how">
			<div class="set place">
				<span class="ico"></span>
				<p class="txt">Place on a dark background</p>
			</div>
			<div class="set glare">
				<span class="ico"></span>
				<p class="txt">Avoid glare by adjusting the angle</p>
			</div>
			<div class="set text">
				<span class="ico"></span>
				<p class="txt">Hold steady so the text is clear</p>
			</div>
		</div>

		<div class="scan-area">
			<div class="camera-area">
				<video id="passportScanVideo" class="live-img" autoplay playsinline muted style="
					width:100%; height:100%;
					object-fit:cover;"></video>
				<div class="spot" data-stat="not"></div><!-- //카메라 인식 영역 -->
				<!-- .spot 의 data-stat case: (라인 컬러 달라집니다)
					1. 감지불가: not
					2. 감지(먼거리): far
					3. 감지(라인 벗어남): out
					4. 감지(정상): in
				-->
			</div>

			<div class="scan-stat">
				<p class="txt">Passport not detected</p>
				<!-- .txt 문구 case:
				 	1. 감지불가: Passport not detected
					2. 감지(먼거리): Hold your passport closer to the camera
					3. 감지(라인 벗어남): Place your passport inside the red box
					4. 감지(정상): Scanning passport
				 -->
			</div>
		</div>
	</div>

	<!-- 인식되면 .scanning-process 보이도록 변경 해 주세요 -->
	<div class="scanning-process" style="display: none;">
		<lottie-player src="../../../assets/images/etc/crypto/process.json" background="transparent" loop speed="1" autoplay></lottie-player>
		<p class="txt">Scanning passport</p>
	</div>

	<script>
		const passportScanStatusText = {
			not: 'Passport not detected',
			far: 'Hold your passport closer to the camera',
			out: 'Place your passport inside the red box',
			in: 'Scanning passport'
		};
		// PoC 설정: true이면 MRZ 체크숫자가 틀려도 주요 필드와 형식이 확인되면 허용한다.
		// 운영 적용 시 반드시 false로 변경해야 한다.
		const passportScanConfig = {
			allowRelaxedMrz: true,
			requiredMatchingReads: 1
		};
		const passportScanState = {
			analyzeTimer: null,
			stableStartAt: 0,
			stream: null,
			completed: false,
			ocrRunning: false,
			retryAfter: 0,
			worker: null,
			workerPromise: null,
			validatedCandidate: null,
			validatedCount: 0,
			validatedPassport: null
		};
		let passportRedirectTimer = null;

		function setPassportScanStatus(status) {
			const spot = document.querySelector('.camera-area .spot');
			const statusText = document.querySelector('.scan-stat .txt');

			if (!spot || !statusText || !passportScanStatusText[status]) {
				return;
			}

			spot.dataset.stat = status;
			statusText.textContent = passportScanStatusText[status];
		}

		function showPassportScanningProcess() {
			const scanningProcess = document.querySelector('.scanning-process');

			setPassportScanStatus('in');

			if (scanningProcess) {
				scanningProcess.style.display = 'block';
			}
		}

		function hidePassportScanningProcess() {
			const scanningProcess = document.querySelector('.scanning-process');

			if (scanningProcess) {
				scanningProcess.style.display = 'none';
			}
		}

		function completePassportScan(passport) {
			clearTimeout(passportRedirectTimer);

			if (passportScanState.completed || !passport
				|| passport !== passportScanState.validatedPassport
				|| passportScanState.validatedCount < passportScanConfig.requiredMatchingReads) {
				return;
			}

			passportScanState.completed = true;
			stopPassportScan();
			showPassportScanningProcess();

			passportRedirectTimer = setTimeout(function () {
				const params = new URLSearchParams({
					passportNumber: passport.passportNumber,
					name: passport.name,
					sex: passport.sex,
					birthDate: passport.birthDate,
					expiryDate: passport.expiryDate
				});

				location.href = 'P9994PG004W.html?' + params.toString();
			}, 1800);
		}

		function preparePassportOcr() {
			if (passportScanState.workerPromise) {
				return passportScanState.workerPromise;
			}

			if (typeof Tesseract === 'undefined') {
				passportScanState.workerPromise = Promise.reject(new Error('OCR library is unavailable'));
				passportScanState.workerPromise.catch(function () {});
				return passportScanState.workerPromise;
			}

			passportScanState.workerPromise = Tesseract.createWorker('eng').then(function (worker) {
				passportScanState.worker = worker;
				return worker.setParameters({
					tessedit_pageseg_mode: '6',
					tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<',
					user_defined_dpi: '300'
				}).then(function () {
					return worker;
				});
			}).catch(function (error) {
				passportScanState.worker = null;
				passportScanState.workerPromise = null;
				throw error;
			});

			return passportScanState.workerPromise;
		}

		function startPassportScan() {
			setPassportScanStatus('not');

			if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
				return;
			}

			navigator.mediaDevices.getUserMedia({
				video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
				audio: false
			}).then(function (stream) {
				const video = document.getElementById('passportScanVideo');

				passportScanState.stream = stream;
				video.srcObject = stream;
				video.play();
				preparePassportOcr().catch(function () {
					setPassportScanMessage('Passport scanner could not be loaded. Please try again.');
				});
				passportScanState.analyzeTimer = setInterval(analyzePassportScanFrame, 250);
			}).catch(function () {
				setPassportScanStatus('not');
			});
		}

		function setPassportScanMessage(message) {
			const statusText = document.querySelector('.scan-stat .txt');

			if (statusText) {
				statusText.textContent = message;
			}
		}

		function getPassportCrop(video) {
			const spot = document.querySelector('.camera-area .spot');

			if (!spot || !video.videoWidth || !video.videoHeight) {
				return null;
			}

			const videoRect = video.getBoundingClientRect();
			const spotRect = spot.getBoundingClientRect();
			const scale = Math.max(videoRect.width / video.videoWidth, videoRect.height / video.videoHeight);
			const renderedWidth = video.videoWidth * scale;
			const renderedHeight = video.videoHeight * scale;
			const hiddenX = (renderedWidth - videoRect.width) / 2;
			const hiddenY = (renderedHeight - videoRect.height) / 2;

			const x = Math.max(0, (spotRect.left - videoRect.left + hiddenX) / scale);
			const y = Math.max(0, (spotRect.top - videoRect.top + hiddenY) / scale);

			return {
				x: x,
				y: y,
				width: Math.min(video.videoWidth - x, spotRect.width / scale),
				height: Math.min(video.videoHeight - y, spotRect.height / scale)
			};
		}

		function capturePassportFrame(video, mrzOnly, outputWidth) {
			const crop = getPassportCrop(video);

			if (!crop) {
				return null;
			}

			if (mrzOnly) {
				crop.y += crop.height * 0.55;
				crop.height *= 0.45;
			}

			const canvas = document.createElement('canvas');
			const width = outputWidth || Math.round(crop.width);
			const height = Math.max(1, Math.round(width * crop.height / crop.width));
			const context = canvas.getContext('2d');

			canvas.width = width;
			canvas.height = height;
			context.drawImage(video, crop.x, crop.y, crop.width, crop.height, 0, 0, width, height);

			return canvas;
		}

		function analyzePassportScanFrame() {
			const video = document.getElementById('passportScanVideo');

			if (passportScanState.completed || passportScanState.ocrRunning || !video || !video.videoWidth) {
				return;
			}

			const canvas = capturePassportFrame(video, false, 160);

			if (!canvas) {
				return;
			}

			const context = canvas.getContext('2d');
			const width = canvas.width;
			const height = canvas.height;

			const imageData = context.getImageData(0, 0, width, height).data;
			let edgeCount = 0;
			const total = (width - 1) * height;

			for (let y = 0; y < height; y += 1) {
				for (let x = 1; x < width; x += 1) {
					const index = (y * width + x) * 4;
					const prevIndex = (y * width + (x - 1)) * 4;
					const gray = (imageData[index] + imageData[index + 1] + imageData[index + 2]) / 3;
					const prevGray = (imageData[prevIndex] + imageData[prevIndex + 1] + imageData[prevIndex + 2]) / 3;

					if (Math.abs(gray - prevGray) > 18) {
						edgeCount += 1;
					}
				}
			}

			updatePassportScanDetection(edgeCount / total);
		}

		function updatePassportScanDetection(edgeRatio) {
			const now = Date.now();

			if (now < passportScanState.retryAfter) {
				return;
			}

			if (edgeRatio <= 0.035) {
				passportScanState.stableStartAt = 0;
				setPassportScanStatus('not');
				return;
			}

			if (edgeRatio <= 0.055) {
				passportScanState.stableStartAt = 0;
				setPassportScanStatus('far');
				return;
			}

			if (edgeRatio <= 0.07) {
				passportScanState.stableStartAt = 0;
				setPassportScanStatus('out');
				return;
			}

			setPassportScanStatus('in');

			if (!passportScanState.stableStartAt) {
				passportScanState.stableStartAt = now;
			}

			if (now - passportScanState.stableStartAt >= 1500) {
				verifyPassportScan();
			}
		}

		function verifyPassportScan() {
			const video = document.getElementById('passportScanVideo');

			if (passportScanState.completed || passportScanState.ocrRunning || !video) {
				return;
			}

			const mrzCanvas = capturePassportFrame(video, true, 1400);

			if (!mrzCanvas) {
				return;
			}

			passportScanState.ocrRunning = true;

			preparePassportOcr().then(function (worker) {
				return worker.recognize(mrzCanvas);
			}).then(function (result) {
				const passport = parsePassportMrz(result && result.data ? result.data.text : '');

				if (!passport) {
					throw new Error('A valid passport MRZ was not recognized');
				}

				const fingerprint = getPassportFingerprint(passport);

				if (passportScanState.validatedCandidate === fingerprint) {
					passportScanState.validatedCount += 1;
				} else {
					passportScanState.validatedCandidate = fingerprint;
					passportScanState.validatedCount = 1;
				}

				if (passportScanState.validatedCount < passportScanConfig.requiredMatchingReads) {
					passportScanState.ocrRunning = false;
					passportScanState.stableStartAt = 0;
					passportScanState.retryAfter = Date.now() + 800;
					hidePassportScanningProcess();
					setPassportScanStatus('in');
					setPassportScanMessage('Passport detected. Hold steady for verification.');
					return;
				}

				passportScanState.validatedPassport = passport;
				completePassportScan(passport);
			}).catch(function () {
				passportScanState.ocrRunning = false;
				passportScanState.stableStartAt = 0;
				passportScanState.retryAfter = Date.now() + 1500;
				passportScanState.validatedCandidate = null;
				passportScanState.validatedCount = 0;
				passportScanState.validatedPassport = null;
				hidePassportScanningProcess();
				setPassportScanStatus('not');
				setPassportScanMessage('Passport could not be recognized. Please try again.');
			});
		}

		function getPassportFingerprint(passport) {
			return [
				passport.passportNumber,
				passport.name,
				passport.sex,
				passport.birthDate,
				passport.expiryDate
			].join('|');
		}

		function normalizeMrzLine(line) {
			return String(line || '')
				.toUpperCase()
				.replace(/[«‹]/g, '<')
				.replace(/[^A-Z0-9<]/g, '');
		}

		function mrzCharacterValue(character) {
			if (/^[0-9]$/.test(character)) {
				return Number(character);
			}

			if (/^[A-Z]$/.test(character)) {
				return character.charCodeAt(0) - 55;
			}

			return 0;
		}

		function isValidMrzCheck(value, checkDigit) {
			const weights = [7, 3, 1];
			let sum = 0;

			if (!/^\d$/.test(checkDigit)) {
				return false;
			}

			for (let index = 0; index < value.length; index += 1) {
				sum += mrzCharacterValue(value[index]) * weights[index % weights.length];
			}

			return sum % 10 === Number(checkDigit);
		}

		function normalizeMrzDigits(value) {
			return value
				.replace(/O/g, '0')
				.replace(/[IL]/g, '1')
				.replace(/Z/g, '2')
				.replace(/S/g, '5')
				.replace(/G/g, '6')
				.replace(/B/g, '8');
		}

		function normalizeMrzLetters(value) {
			return value
				.replace(/0/g, 'O')
				.replace(/[1L]/g, 'I')
				.replace(/2/g, 'Z')
				.replace(/5/g, 'S')
				.replace(/6/g, 'G')
				.replace(/8/g, 'B');
		}

		function isValidMrzDate(value) {
			if (!/^\d{6}$/.test(value)) {
				return false;
			}

			const month = Number(value.slice(2, 4));
			const day = Number(value.slice(4, 6));
			const date = new Date(Date.UTC(2000 + Number(value.slice(0, 2)), month - 1, day));

			return date.getUTCMonth() === month - 1 && date.getUTCDate() === day;
		}

		function parsePassportMrz(rawText) {
			const strictPassport = parsePassportMrzStrict(rawText);

			if (strictPassport || !passportScanConfig.allowRelaxedMrz) {
				return strictPassport;
			}

			return parsePassportMrzRelaxed(rawText);
		}

		function parsePassportMrzStrict(rawText) {
			const lines = String(rawText || '').split(/\r?\n/).map(normalizeMrzLine).filter(Boolean);
			const flattened = normalizeMrzLine(rawText);
			let flattenedStart = flattened.indexOf('P<');

			// OCR 결과에서 MRZ 두 줄의 개행이 사라진 경우도 동일한 44자 규격으로 복원한다.
			while (flattenedStart >= 0 && flattened.length - flattenedStart >= 88) {
				lines.push(flattened.slice(flattenedStart, flattenedStart + 44));
				lines.push(flattened.slice(flattenedStart + 44, flattenedStart + 88));
				flattenedStart = flattened.indexOf('P<', flattenedStart + 2);
			}

			for (let firstIndex = 0; firstIndex < lines.length - 1; firstIndex += 1) {
				const firstStart = lines[firstIndex].indexOf('P<');

				if (firstStart < 0 || lines[firstIndex].length - firstStart < 44) {
					continue;
				}

				const firstLine = lines[firstIndex].slice(firstStart, firstStart + 44);
				const secondSource = lines[firstIndex + 1];

				for (let offset = 0; offset <= secondSource.length - 44; offset += 1) {
					const secondLineRaw = secondSource.slice(offset, offset + 44);
					const secondLine = secondLineRaw.slice(0, 9)
						+ normalizeMrzDigits(secondLineRaw.slice(9, 10))
						+ secondLineRaw.slice(10, 13)
						+ normalizeMrzDigits(secondLineRaw.slice(13, 20))
						+ secondLineRaw.slice(20, 21)
						+ normalizeMrzDigits(secondLineRaw.slice(21, 28))
						+ secondLineRaw.slice(28, 42)
						+ normalizeMrzDigits(secondLineRaw.slice(42, 44));
					const passportNumber = secondLine.slice(0, 9);
					const birthDate = secondLine.slice(13, 19);
					const expiryDate = secondLine.slice(21, 27);
					const composite = secondLine.slice(0, 10) + secondLine.slice(13, 20)
						+ secondLine.slice(21, 43);

					if (!isValidMrzCheck(passportNumber, normalizeMrzDigits(secondLine[9]))
						|| !isValidMrzCheck(birthDate, secondLine[19])
						|| !isValidMrzCheck(expiryDate, secondLine[27])
						|| !isValidMrzCheck(composite, secondLine[43])
						|| !isValidMrzDate(birthDate)
						|| !isValidMrzDate(expiryDate)) {
						continue;
					}

					const nameParts = firstLine.slice(5).split('<<');
					const surname = (nameParts.shift() || '').replace(/</g, ' ').trim();
					const givenNames = nameParts.join(' ').replace(/</g, ' ').replace(/\s+/g, ' ').trim();
					const name = (surname + ' ' + givenNames).trim();
					const sex = secondLine[20] === '<' ? 'X' : secondLine[20];

					if (!name || !/^[A-Z0-9]{5,9}<*$/.test(passportNumber) || !/^[MFUX]$/.test(sex)) {
						continue;
					}

					return {
						passportNumber: passportNumber.replace(/</g, ''),
						name: name,
						sex: sex,
						birthDate: birthDate,
						expiryDate: expiryDate
					};
				}
			}

			return null;
		}

		function parsePassportMrzRelaxed(rawText) {
			const lines = String(rawText || '').split(/\r?\n/).map(normalizeMrzLine).filter(Boolean);
			const flattened = normalizeMrzLine(rawText);
			let firstLine = '';

			for (let index = 0; index < lines.length; index += 1) {
				const start = lines[index].indexOf('P<');

				if (start >= 0 && lines[index].slice(start).indexOf('<<') >= 5) {
					firstLine = lines[index].slice(start, start + 44);
					break;
				}
			}

			if (!firstLine) {
				const start = flattened.indexOf('P<');

				if (start >= 0) {
					firstLine = flattened.slice(start, start + 44);
				}
			}

			if (!firstLine || firstLine.indexOf('<<') < 5) {
				return null;
			}

			const issuer = normalizeMrzLetters(firstLine.slice(2, 5));
			const nameParts = firstLine.slice(5).split('<<');
			const surname = normalizeMrzLetters(nameParts.shift() || '').replace(/</g, ' ').trim();
			const givenNames = normalizeMrzLetters(nameParts.join(' ')).replace(/</g, ' ').replace(/\s+/g, ' ').trim();
			const name = (surname + ' ' + givenNames).trim();
			const surnameLetterCount = surname.replace(/[^A-Z]/g, '').length;

			// PoC 완화 판정: 첫 번째 MRZ 줄의 발급국 및 성명 영역이 충분히 읽히면 성공 후보로 본다.
			if (!/^[A-Z]{3}$/.test(issuer)
				|| surnameLetterCount < 2) {
				return null;
			}

			const candidates = lines.slice();
			const flattenedMrzStart = flattened.indexOf('P<');

			if (flattenedMrzStart >= 0 && flattened.length > flattenedMrzStart + 44) {
				candidates.push(flattened.slice(flattenedMrzStart + 44));
			}

			// 두 번째 줄은 성공 조건이 아니며, 읽힌 값만 다음 화면에 전달한다.
			const digit = '[0-9OILZSBG]';
			const structure = new RegExp('([A-Z0-9<]{9,12})([A-Z]{3})(' + digit + '{6})'
				+ digit + '?([MFUX<])(' + digit + '{6})' + digit + '?');
			let passportNumber = '';
			let birthDate = '';
			let sex = '';
			let expiryDate = '';

			for (let index = 0; index < candidates.length; index += 1) {
				const match = candidates[index].match(structure);

				if (!match) {
					continue;
				}

				const parsedPassportNumber = match[1].slice(0, 9).replace(/</g, '');
				const parsedBirthDate = normalizeMrzDigits(match[3]);
				const parsedSex = match[4] === '<' ? 'X' : match[4];
				const parsedExpiryDate = normalizeMrzDigits(match[5]);

				passportNumber = parsedPassportNumber;
				birthDate = parsedBirthDate;
				sex = /^[MFUX]$/.test(parsedSex) ? parsedSex : '';
				expiryDate = parsedExpiryDate;
				break;
			}

			return {
				passportNumber: passportNumber,
				name: name,
				sex: sex,
				birthDate: birthDate,
				expiryDate: expiryDate
			};
		}

		function stopPassportScan() {
			clearInterval(passportScanState.analyzeTimer);
			passportScanState.analyzeTimer = null;

			if (passportScanState.stream) {
				passportScanState.stream.getTracks().forEach(function (track) {
					track.stop();
				});
				passportScanState.stream = null;
			}

			if (passportScanState.worker) {
				passportScanState.worker.terminate();
				passportScanState.worker = null;
				passportScanState.workerPromise = null;
			}
		}

		window.setPassportScanStatus = setPassportScanStatus;
		window.stopPassportScan = stopPassportScan;

		document.querySelector('.live-img').style.left = '50%';
		document.querySelector('.live-img').style.top = '50%';

		window.addEventListener('beforeunload', stopPassportScan);
		startPassportScan();
	</script>
</body>
</html>
